<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLUT Shape Code Generator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23667eea'/><path d='M20 20 L50 10 L80 20 L80 50 L50 60 L20 50 Z' fill='white'/><path d='M20 50 L50 60 L80 50 L80 80 L50 90 L20 80 Z' fill='%23f0f0f0'/><path d='M20 20 L50 10 L50 60 L20 50 Z' fill='%23d0d0d0'/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 40px;
        }

        .main-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            height: calc(100vh - 40px);
        }

        /* Sidebar Styles */
        .sidebar {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 24px;
            overflow-y: auto;
            display: flex;
            margin-bottom: 8px;
            flex-direction: column;
            scrollbar-width: 0;
            gap: 24px;
        }

        .sidebar h1 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 600;
            color: #1a202c;
            margin-bottom: 8px;
        }

        .sidebar h1 i {
            color: #667eea;
            font-size: 26px;
        }

        .sidebar .subtitle {
            font-size: 14px;
            color: #718096;
            margin-bottom: 16px;
        }

        /* Section Styles */
        .section {
            background: #f7fafc;
            border-radius: 8px;
            padding: 16px;
            border: 1px solid #e2e8f0;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #2d3748;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        /* Input Group Styles */
        .input-group {
            margin-bottom: 12px;
        }

        .input-group:last-child {
            margin-bottom: 0;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
            background: white;
            color: #2d3748;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .axis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Button Styles */
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(72, 187, 120, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(245, 101, 101, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(245, 101, 101, 0.4);
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        /* Mode Selector Styles */
        .mode-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .mode-btn {
            padding: 10px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            color: #4a5568;
        }

        .mode-btn:hover {
            border-color: #cbd5e0;
            background: #f7fafc;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        /* Main Content Styles */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
        }

        .canvas-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .canvas-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .canvas-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a202c;
        }

        .canvas-info {
            font-size: 13px;
            color: #718096;
            background: #f7fafc;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .canvas-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f7fafc;
            border-radius: 8px;
            padding: 20px;
        }

        #imageCanvas {
            display: block;
            cursor: crosshair;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 100%;
            height: auto;
        }

        /* Output Section Styles */
        .output-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 24px;
            max-height: 300px;
            display: flex;
            flex-direction: column;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .output-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a202c;
        }

        .copy-btn {
            padding: 6px 12px;
            background: #edf2f7;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #4a5568;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #e2e8f0;
        }

        /* Icon spacing */
        .btn i, .copy-btn i {
            margin-right: 6px;
        }

        #codeOutput {
            width: 100%;
            flex: 1;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            background: #f7fafc;
            color: #2d3748;
            resize: vertical;
            white-space: pre;
            overflow: auto;
            line-height: 1.6;
        }

        #codeOutput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #fileInput {
            display: none;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: #c6f6d5;
            color: #22543d;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #38a169;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Scrollbar Styles */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a0aec0;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
                height: auto;
            }

            .sidebar {
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div>
                <h1><i class="fas fa-cube"></i> GLUT Code Generator</h1>
                <p class="subtitle">Draw shapes and generate OpenGL code</p>
            </div>

            <!-- File Upload Section -->
            <div class="section">
                <div class="section-title">Image</div>
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-folder-open"></i> Load Image
                </button>
                <input type="file" id="fileInput" accept="image/*" onchange="loadImage(event)">
            </div>

            <!-- Axis Configuration Section -->
            <div class="section">
                <div class="section-title">Axis Configuration</div>
                <div class="axis-grid">
                    <div class="input-group">
                        <label class="input-label">X Min</label>
                        <input type="number" id="xMin" value="-1.0" step="0.1">
                    </div>
                    <div class="input-group">
                        <label class="input-label">X Max</label>
                        <input type="number" id="xMax" value="1.0" step="0.1">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Y Min</label>
                        <input type="number" id="yMin" value="-1.0" step="0.1">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Y Max</label>
                        <input type="number" id="yMax" value="1.0" step="0.1">
                    </div>
                </div>
            </div>

            <!-- Primitive Type Section -->
            <div class="section">
                <div class="section-title">Primitive Type</div>
                <div class="mode-grid">
                    <button class="mode-btn active" onclick="setMode('polygon', event)">Polygon</button>
                    <button class="mode-btn" onclick="setMode('quads', event)">Quads</button>
                    <button class="mode-btn" onclick="setMode('lines', event)">Lines</button>
                    <button class="mode-btn" onclick="setMode('line_loop', event)">Line Loop</button>
                    <button class="mode-btn" onclick="setMode('circle', event)">Circle</button>
                    <button class="mode-btn" onclick="setMode('triangles', event)">Triangles</button>
                </div>
            </div>

            <!-- Color Picker Section -->
            <div class="section">
                <div class="section-title">Color</div>
                <div class="input-group">
                    <label class="input-label" for="shapeColor">Shape Color</label>
                    <input type="color" id="shapeColor" value="#667eea" style="width: 100%; height: 40px; padding: 0; border: none; background: transparent; cursor: pointer;">
                </div>
            </div>

            <!-- Actions Section -->
            <div class="section">
                <div class="section-title">Actions</div>
                <button class="btn btn-success" onclick="generateCode()">
                    <i class="fas fa-code"></i> Generate Code
                </button>
                <button class="btn btn-danger" onclick="clearPoints()" style="margin-top: 8px;">
                    <i class="fas fa-trash-alt"></i> Clear Points
                </button>
            </div>

            <!-- Status Section -->
            <div class="section" style="margin-top: auto;">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <span class="status-badge">
                        <span class="status-dot"></span>
                        Ready
                    </span>
                    <span id="pointCount" style="font-size: 13px; color: #718096;">0 points</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Canvas Section -->
            <div class="canvas-section">
                <div class="canvas-header">
                    <h2 class="canvas-title">Drawing Canvas</h2>
                    <div class="canvas-info">Click to place points</div>
                </div>
                <div class="canvas-wrapper">
                    <canvas id="imageCanvas" width="600" height="600"></canvas>
                </div>
            </div>

            <!-- Output Section -->
            <div class="output-section">
                <div class="output-header">
                    <h2 class="output-title">Generated Code</h2>
                    <button class="copy-btn" onclick="copyCode()"><i class="fas fa-copy"></i> Copy</button>
                </div>
                <textarea id="codeOutput" readonly placeholder="Your generated GLUT code will appear here..."></textarea>
            </div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        let image = null;
        let points = [];
        let currentMode = 'polygon';
        let circleCenter = null;
        let circleRadiusPoint = null;

        // Update point counter
        function updatePointCount() {
            const countElement = document.getElementById('pointCount');
            const count = currentMode === 'circle' ? 
                (circleCenter ? (circleRadiusPoint ? '2' : '1') : '0') : 
                points.length;
            countElement.textContent = `${count} point${count !== 1 ? 's' : ''}`;
        }

        // Load image
        function loadImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    image = img;
                    drawImage();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function drawImage() {
            if (image) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
                redrawPoints();
            }
        }

        function drawGrid() {
            const gridSize = 10;
            ctx.save();
            ctx.strokeStyle = 'rgba(203, 213, 224, 0.9)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = gridSize; x < canvas.width; x += gridSize) {
                ctx.moveTo(x + 0.5, 0);
                ctx.lineTo(x + 0.5, canvas.height);
            }
            for (let y = gridSize; y < canvas.height; y += gridSize) {
                ctx.moveTo(0, y + 0.5);
                ctx.lineTo(canvas.width, y + 0.5);
            }
            ctx.stroke();
            ctx.restore();
        }

        function redrawPoints() {
            // Always clear the canvas first
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw image if available
            if (image) {
                ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
            } else {
                // Draw background if no image
                ctx.fillStyle = '#f7fafc';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Draw grid over background / image
            drawGrid();

            // Redraw points and lines
            points.forEach((point, index) => {
                ctx.fillStyle = '#667eea';
                ctx.beginPath();
                ctx.arc(point.x, point.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();

                if (currentMode === 'polygon' || currentMode === 'line_loop') {
                    if (index > 0) {
                        ctx.strokeStyle = '#667eea';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(points[index - 1].x, points[index - 1].y);
                        ctx.lineTo(point.x, point.y);
                        ctx.stroke();
                    }
                } else if (currentMode === 'lines') {
                    if (index > 0 && index % 2 === 1) {
                        ctx.strokeStyle = '#667eea';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(points[index - 1].x, points[index - 1].y);
                        ctx.lineTo(point.x, point.y);
                        ctx.stroke();
                    }
                } else if (currentMode === 'quads') {
                    if (index > 0 && index % 4 === 0) {
                        const p1 = points[index - 4];
                        const p2 = points[index - 3];
                        const p3 = points[index - 2];
                        const p4 = points[index - 1];
                        ctx.strokeStyle = '#667eea';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.lineTo(p3.x, p3.y);
                        ctx.lineTo(p4.x, p4.y);
                        ctx.closePath();
                        ctx.stroke();
                    }
                } else if (currentMode === 'triangles') {
                    if (index > 0 && index % 3 === 0) {
                        const p1 = points[index - 3];
                        const p2 = points[index - 2];
                        const p3 = points[index - 1];
                        ctx.strokeStyle = '#667eea';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.lineTo(p3.x, p3.y);
                        ctx.closePath();
                        ctx.stroke();
                    }
                }
            });

            // Draw circle
            if (currentMode === 'circle') {
                if (circleCenter) {
                    ctx.fillStyle = '#48bb78';
                    ctx.beginPath();
                    ctx.arc(circleCenter.x, circleCenter.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.fillStyle = '#2d3748';
                    ctx.font = 'bold 12px sans-serif';
                    ctx.fillText('Center', circleCenter.x + 10, circleCenter.y - 10);
                }

                if (circleRadiusPoint) {
                    ctx.fillStyle = '#f56565';
                    ctx.beginPath();
                    ctx.arc(circleRadiusPoint.x, circleRadiusPoint.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    if (circleCenter) {
                        const radius = Math.sqrt(
                            Math.pow(circleRadiusPoint.x - circleCenter.x, 2) +
                            Math.pow(circleRadiusPoint.y - circleCenter.y, 2)
                        );
                        ctx.strokeStyle = '#667eea';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.arc(circleCenter.x, circleCenter.y, radius, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }
            }

            updatePointCount();
        }

        // Canvas click handler
        canvas.addEventListener('click', function(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (currentMode === 'circle') {
                if (!circleCenter) {
                    circleCenter = { x, y };
                } else if (!circleRadiusPoint) {
                    circleRadiusPoint = { x, y };
                } else {
                    // Reset for new circle
                    circleCenter = { x, y };
                    circleRadiusPoint = null;
                }
            } else {
                points.push({ x, y });
            }

            redrawPoints();
        });

        // Keyboard handler for undo (Ctrl + Z) to deselect latest point
        document.addEventListener('keydown', function(e) {
            const isUndo = (e.ctrlKey || e.metaKey) && (e.key === 'z' || e.key === 'Z');
            if (!isUndo) return;

            e.preventDefault();

            if (currentMode === 'circle') {
                if (circleRadiusPoint) {
                    circleRadiusPoint = null;
                } else if (circleCenter) {
                    circleCenter = null;
                }
            } else {
                if (points.length > 0) {
                    points.pop();
                }
            }

            redrawPoints();
        });

        // Mouse move for circle preview
        canvas.addEventListener('mousemove', function(e) {
            if (currentMode === 'circle' && circleCenter && !circleRadiusPoint) {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const radius = Math.sqrt(
                    Math.pow(x - circleCenter.x, 2) +
                    Math.pow(y - circleCenter.y, 2)
                );

                redrawPoints();
                ctx.strokeStyle = 'rgba(102, 126, 234, 0.4)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.arc(circleCenter.x, circleCenter.y, radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        });

        // Set mode
        function setMode(mode, event) {
            currentMode = mode;
            if (mode !== 'circle') {
                circleCenter = null;
                circleRadiusPoint = null;
            }

            // Update button states
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            if (event && event.target) {
                event.target.classList.add('active');
            }

            redrawPoints();
        }

        // Convert coordinates
        function convertCoords(x, y) {
            const xMin = parseFloat(document.getElementById('xMin').value);
            const xMax = parseFloat(document.getElementById('xMax').value);
            const yMin = parseFloat(document.getElementById('yMin').value);
            const yMax = parseFloat(document.getElementById('yMax').value);

            const canvasWidth = 600;
            const canvasHeight = 600;

            const glX = xMin + (x / canvasWidth) * (xMax - xMin);
            const glY = yMax - (y / canvasHeight) * (yMax - yMin);

            return { x: glX, y: glY };
        }

        function hexToGLColor(hex) {
            // Expecting #RRGGBB from <input type="color">
            if (!hex || hex[0] !== '#' || hex.length !== 7) {
                return { r: 1.0, g: 1.0, b: 1.0 };
            }
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return {
                r: +r.toFixed(2),
                g: +g.toFixed(2),
                b: +b.toFixed(2)
            };
        }

        // Generate code
        function generateCode() {
            const xMin = parseFloat(document.getElementById('xMin').value);
            const xMax = parseFloat(document.getElementById('xMax').value);
            const yMin = parseFloat(document.getElementById('yMin').value);
            const yMax = parseFloat(document.getElementById('yMax').value);

            if (isNaN(xMin) || isNaN(xMax) || isNaN(yMin) || isNaN(yMax)) {
                document.getElementById('codeOutput').value = '// Invalid axis values. Please enter numbers.';
                return;
            }

            if (xMin >= xMax || yMin >= yMax) {
                document.getElementById('codeOutput').value = '// Invalid axis range. Min must be less than max.';
                return;
            }

            let code = '';

            const colorInput = document.getElementById('shapeColor');
            const color = colorInput ? hexToGLColor(colorInput.value) : { r: 1.0, g: 1.0, b: 1.0 };
            const colorLine = `glColor3f(${color.r}f, ${color.g}f, ${color.b}f);\n`;

            if (currentMode === 'circle') {
                if (!circleCenter || !circleRadiusPoint) {
                    document.getElementById('codeOutput').value = '// Please select center and radius point for circle';
                    return;
                }

                const radiusScreen = Math.sqrt(
                    Math.pow(circleRadiusPoint.x - circleCenter.x, 2) +
                    Math.pow(circleRadiusPoint.y - circleCenter.y, 2)
                );

                const center = convertCoords(circleCenter.x, circleCenter.y);
                const radiusGL = (radiusScreen / 600) * (xMax - xMin);

                const circleFunction = `void drawCircle(float cx, float cy, float r)\n{\n    int i;\n    glBegin(GL_POLYGON);\n    for (i = 0; i < 100; i++)\n    {\n        float angle = 2 * 3.1416f * i / 100;\n        glVertex2f(cx + r * cos(angle),\n                   cy + r * sin(angle));\n    }\n    glEnd();\n}\n\n`;

                code = `${circleFunction}${colorLine}drawCircle(${center.x.toFixed(2)}f, ${center.y.toFixed(2)}f, ${radiusGL.toFixed(2)}f);`;

            } else if (currentMode === 'polygon') {
                if (points.length < 3) {
                    document.getElementById('codeOutput').value = '// Need at least 3 points for polygon';
                    return;
                }

                code = `${colorLine}glBegin(GL_POLYGON);\n`;
                points.forEach(point => {
                    const coords = convertCoords(point.x, point.y);
                    code += `    glVertex2f(${coords.x.toFixed(2)}f, ${coords.y.toFixed(2)}f);\n`;
                });
                code += 'glEnd();';

            } else if (currentMode === 'triangles') {
                if (points.length < 3) {
                    document.getElementById('codeOutput').value = '// Need at least 3 points for triangles';
                    return;
                }

                if (points.length % 3 !== 0) {
                    document.getElementById('codeOutput').value = `// Need multiple of 3 points for triangles. Currently have ${points.length} points.`;
                    return;
                }

                code = `${colorLine}glBegin(GL_TRIANGLES);\n`;
                for (let i = 0; i < points.length; i += 3) {
                    for (let j = 0; j < 3; j++) {
                        const coords = convertCoords(points[i + j].x, points[i + j].y);
                        code += `    glVertex2f(${coords.x.toFixed(2)}f, ${coords.y.toFixed(2)}f);\n`;
                    }
                }
                code += 'glEnd();';

            } else if (currentMode === 'quads') {
                if (points.length < 4) {
                    document.getElementById('codeOutput').value = '// Need at least 4 points for quads (points must be multiple of 4)';
                    return;
                }

                if (points.length % 4 !== 0) {
                    document.getElementById('codeOutput').value = `// Need multiple of 4 points for quads. Currently have ${points.length} points.`;
                    return;
                }

                code = `${colorLine}glBegin(GL_QUADS);\n`;
                for (let i = 0; i < points.length; i += 4) {
                    for (let j = 0; j < 4; j++) {
                        const coords = convertCoords(points[i + j].x, points[i + j].y);
                        code += `    glVertex2f(${coords.x.toFixed(2)}f, ${coords.y.toFixed(2)}f);\n`;
                    }
                }
                code += 'glEnd();';

            } else if (currentMode === 'lines') {
                if (points.length < 2) {
                    document.getElementById('codeOutput').value = '// Need at least 2 points for lines';
                    return;
                }

                if (points.length % 2 !== 0) {
                    document.getElementById('codeOutput').value = `// Need even number of points for lines. Currently have ${points.length} points.`;
                    return;
                }

                code = `${colorLine}glBegin(GL_LINES);\n`;
                for (let i = 0; i < points.length; i += 2) {
                    for (let j = 0; j < 2 && i + j < points.length; j++) {
                        const coords = convertCoords(points[i + j].x, points[i + j].y);
                        code += `    glVertex2f(${coords.x.toFixed(2)}f, ${coords.y.toFixed(2)}f);\n`;
                    }
                }
                code += 'glEnd();';

            } else if (currentMode === 'line_loop') {
                if (points.length < 2) {
                    document.getElementById('codeOutput').value = '// Need at least 2 points for line loop';
                    return;
                }

                code = `${colorLine}glBegin(GL_LINE_LOOP);\n`;
                points.forEach(point => {
                    const coords = convertCoords(point.x, point.y);
                    code += `    glVertex2f(${coords.x.toFixed(2)}f, ${coords.y.toFixed(2)}f);\n`;
                });
                code += 'glEnd();';
            }

            document.getElementById('codeOutput').value = code;
        }

        // Copy code to clipboard
        function copyCode() {
            const codeOutput = document.getElementById('codeOutput');
            codeOutput.select();
            document.execCommand('copy');
            
            const copyBtn = document.querySelector('.copy-btn');
            const originalHTML = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            setTimeout(() => {
                copyBtn.innerHTML = originalHTML;
            }, 2000);
        }

        // Clear points
        function clearPoints() {
            points = [];
            circleCenter = null;
            circleRadiusPoint = null;
            redrawPoints();
            updatePointCount();
            document.getElementById('codeOutput').value = '';
        }

        // Initialize
        ctx.fillStyle = '#f7fafc';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#cbd5e0';
        ctx.font = '16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Load an image or start drawing', canvas.width / 2, canvas.height / 2);
        updatePointCount();
    </script>
</body>
</html>
